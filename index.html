<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>코인 정보 센터 PRO</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #020617; color: #f8fafc; margin: 0; padding: 0; }
        .whale-banner { background: linear-gradient(90deg, #1e3a8a, #3b82f6); padding: 10px; text-align: center; font-weight: bold; font-size: 0.9rem; border-bottom: 2px solid #60a5fa; }
        
        /* 레이아웃: 양옆 광고를 위한 3단 구성 */
        .main-layout { display: flex; justify-content: center; max-width: 1400px; margin: 0 auto; padding: 20px; gap: 20px; }
        .side-ads { width: 200px; min-height: 600px; background: #0f172a; border: 1px dashed #334155; display: flex; align-items: center; justify-content: center; color: #475569; font-size: 0.8rem; text-align: center; border-radius: 10px; }
        .content-area { flex: 1; max-width: 800px; }

        h1 { color: #38bdf8; display: flex; justify-content: space-between; align-items: center; margin-top: 0; }
        .box { background: #1e293b; padding: 18px; margin-bottom: 15px; border-radius: 10px; border-left: 6px solid #38bdf8; transition: 0.3s; }
        .box:hover { background: #2d3748; transform: translateY(-2px); }
        .box a { color: #f1f5f9; font-weight: bold; text-decoration: none; font-size: 1.15rem; display: block; margin-bottom: 8px; }
        .source { color: #94a3b8; font-size: 0.85rem; background: #020617; padding: 2px 8px; border-radius: 4px; }

        /* 모바일 대응 (화면이 작아지면 광고 숨김) */
        @media (max-width: 1000px) { .side-ads { display: none; } }
    </style>
</head>
<body>
    <div class="whale-banner">🚨 [고래 알람] 실시간 자금 흐름 및 글로벌 시장 뉴스 분석 중...</div>
    
    <div class="main-layout">
        <div class="side-ads">구글 애드센스<br>왼쪽 사이드바</div>

        <div class="content-area">
            <h1>🚀 글로벌 코인 뉴스 리포트 <span id="clock" style="font-size: 0.9rem; color: #94a3b
