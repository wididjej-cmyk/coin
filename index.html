<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>글로벌 코인 리포트</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #020617; color: #f8fafc; margin: 0; padding: 0; }
        .whale-banner { background: linear-gradient(90deg, #1e3a8a, #3b82f6); padding: 10px; text-align: center; font-weight: bold; font-size: 0.9rem; border-bottom: 2px solid #60a5fa; }
        .main-layout { display: flex; justify-content: center; max-width: 1400px; margin: 0 auto; padding: 20px; gap: 20px; }
        .side-ads { width: 180px; min-height: 600px; background: #0f172a; border: 1px dashed #334155; display: flex; align-items: center; justify-content: center; color: #475569; font-size: 0.8rem; text-align: center; border-radius: 10px; flex-shrink: 0; }
        .content-area { flex: 1; max-width: 800px; min-width: 300px; }
        h1 { color: #38bdf8; display: flex; justify-content: space-between; align-items: center; margin-top: 0; font-size: 1.8rem; }
        .box { background: #1e293b; padding: 18px; margin-bottom: 15px; border-radius: 10px; border-left: 6px solid #38bdf8; transition: 0.3s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .box:hover { background: #2d3748; transform: translateY(-2px); border-left-color: #7dd3fc; }
        .box a { color: #f1f5f9; font-weight: bold; text-decoration: none; font-size: 1.1rem; display: block; margin-bottom: 8px; line-height: 1.4; }
        .source { color: #94a3b8; font-size: 0.8rem; background: #020617; padding: 3px 8px; border-radius: 4px; display: inline-block; }
        @media (max-width: 1000px) { .side-ads { display: none; } }
    </style>
</head>
<body>
    <div class="whale-banner">🚨 [고래 알람] 글로벌 자금 흐름 및 주요국 가상자산 정책 실시간 모니터링 중...</div>
    <div class="main-layout">
        <div class="side-ads">구글 애드센스<br>왼쪽 영역</div>
        <div class="content-area">
            <h1>🚀 글로벌 코인 뉴스 리포트 <span id="clock" style="font-size: 0.8rem; color: #94a3b8;"></span></h1>
            <div id="news-list">데이터를 실시간으로 스캔하고 있습니다...</div>
        </div>
        <div class="side-ads">구글 애드센스<br>오른쪽 영역</div>
    </div>

    <script>
        async function fetchNews() {
            const list = document.getElementById('news-list');
            const clock = document.getElementById('clock');
            // 실시간성을 위해 검색 키워드를 더 공격적으로 배치 (국내외 속보 포함)
            const queries = ['가상화폐+속보', '비트코인+리플+급등', 'SEC+리플+판결', 'Fed+금리+비트코인', 'Upbit+Listing'];
            let allItems = [];

            try {
                for (const q of queries) {
                    const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=ko&gl=KR&ceid=KR:ko`;
                    const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`);
                    const data = await response.json();
                    if (data.status === 'ok') allItems.push(...data.items);
                }

                // 1. 중복 제거 2. 시간순 정렬 (최신이 위로)
                const unique = Array.from(new Map(allItems.map(item => [item.link, item])).values())
                                    .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

                list.innerHTML = '';
                unique.slice(0, 40).forEach(item => { // 상위 40개 노출
                    const div = document.createElement('div');
                    div.className = 'box';
                    div.innerHTML = `
                        <a href="${item.link}" target="_blank">${item.title}</a>
                        <span class="source">⏰ ${new Date(item.pubDate).toLocaleString()}</span>
                    `;
                    list.appendChild(div);
                });
                clock.innerText = `최종 갱신: ${new Date().toLocaleTimeString()}`;
            } catch (e) {
                list.innerText = '뉴스를 불러오는 중 일시적인 오류가 발생했습니다. 잠시만 기다려 주세요.';
            }
        }

        fetchNews();
        setInterval(fetchNews, 60000); // 1분 자동 갱신
    </script>
</body>
</html>
