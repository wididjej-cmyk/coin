<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>글로벌 코인 리포트 24h</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #020617; color: #f8fafc; margin: 0; padding: 0; overflow-x: hidden; }
        .whale-banner { background: linear-gradient(90deg, #1e3a8a, #3b82f6); padding: 10px; text-align: center; font-weight: bold; font-size: 0.9rem; border-bottom: 2px solid #60a5fa; }
        
        /* [핵심] 3단 레이아웃 강제 고정 */
        .main-container { display: flex; width: 100%; max-width: 1600px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        
        .side-ads { 
            width: 200px; 
            min-height: 800px; 
            background: #0f172a; 
            border: 2px dashed #334155; /* 점선을 더 진하게 */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #475569; 
            font-size: 0.8rem; 
            text-align: center; 
            border-radius: 10px; 
            flex-shrink: 0; 
        }

        .content-area { flex: 1; margin: 0 20px; min-width: 0; }

        h1 { color: #38bdf8; display: flex; justify-content: space-between; align-items: center; margin-top: 0; font-size: 1.6rem; }
        .box { background: #1e293b; padding: 18px; margin-bottom: 15px; border-radius: 10px; border-left: 6px solid #38bdf8; transition: 0.3s; }
        .box:hover { background: #2d3748; transform: translateX(5px); }
        .box a { color: #f1f5f9; font-weight: bold; text-decoration: none; font-size: 1.1rem; display: block; margin-bottom: 8px; line-height: 1.4; }
        .source { color: #94a3b8; font-size: 0.8rem; background: #020617; padding: 3px 8px; border-radius: 4px; }
        
        /* 화면이 너무 작아질 때만 광고 숨김 */
        @media (max-width: 1000px) { .side-ads { display: none; } .main-container { padding: 10px; } }
    </style>
</head>
<body>
    <div class="whale-banner">🚨 실시간 글로벌 코인 뉴스 및 자산 흐름 모니터링 중</div>
    
    <div class="main-container">
        <div class="side-ads">GOOGLE ADS<br>LEFT SIDEBAR</div>

        <div class="content-area">
            <h1>🚀 실시간 코인 대시보드 <span id="clock" style="font-size: 0.8rem; color: #94a3b8;"></span></h1>
            <div id="news-list">최신 뉴스를 정렬하여 불러오는 중...</div>
        </div>

        <div class="side-ads">GOOGLE ADS<br>RIGHT SIDEBAR</div>
    </div>

    <script>
        async function fetchMegaNews() {
            const list = document.getElementById('news-list');
            const clock = document.getElementById('clock');
            const queries = ['비트코인 속보', '리플 판결 소식', '가상자산 뉴스', '코인 시장 전망'];
            let allItems = [];

            try {
                for (const q of queries) {
                    const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=ko&gl=KR&ceid=KR:ko`;
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`);
                    const data = await res.json();
                    if (data.status === 'ok') allItems.push(...data.items);
                }

                // 중복 제거 및 시간순 정렬
                const uniqueNews = Array.from(new Map(allItems.map(item => [item.title, item])).values())
                    .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

                list.innerHTML = '';
                uniqueNews.slice(0, 50).forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'box';
                    div.innerHTML = `
                        <a href="${item.link}" target="_blank">${item.title}</a>
                        <span class="source">📅 ${new Date(item.pubDate).toLocaleString()}</span>
                    `;
                    list.appendChild(div);
                });
                clock.innerText = `마지막 갱신: ${new Date().toLocaleTimeString()}`;
            } catch (e) {
                list.innerHTML = '데이터 수집 중... 잠시만 기다려주세요.';
            }
        }
        fetchMegaNews();
        setInterval(fetchMegaNews, 60000);
    </script>
</body>
</html>
